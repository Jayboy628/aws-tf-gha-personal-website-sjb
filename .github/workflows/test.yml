name: Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_bucket_name: ${{ secrets.BUCKET_NAME }}

jobs:
  terraform:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActionsTerraform

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Terraform format check
        run: terraform -chdir=terraform_project fmt -check -diff

      - name: Terraform initialize
        run: terraform -chdir=terraform_project init

      - name: Terraform validate
        run: terraform -chdir=terraform_project validate

      - name: Terraform plan
        run: terraform -chdir=terraform_project plan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform -chdir=terraform_project apply -auto-approve

      - name: Upload website files to S3
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 cp index.html "s3://${{ secrets.BUCKET_NAME }}/index.html"
          aws s3 cp script.js "s3://${{ secrets.BUCKET_NAME }}/script.js"
          aws s3 cp styles.css "s3://${{ secrets.BUCKET_NAME }}/styles.css"

          aws s3 sync assets/ \
            "s3://${{ secrets.BUCKET_NAME }}/assets/" \
            --delete